<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>TaskFlow Pro | Login</title>

    <!-- Google Font -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
          href="login.css">

</head>

<body>

    <!-- Animated Background -->

    <canvas id="bgCanvas"></canvas>

    <!-- Login Card -->

    <div class="login-container">

        <div class="login-header">

            <h1>

                Welcome Back

            </h1>

            <p>

                Sign in to continue using TaskFlow Pro

            </p>

        </div>

        <form
            id="loginForm"
            autocomplete="off">

            <div class="input-box">

                <label>

                    Email Address

                </label>

                <div class="input-field">

                    <i class="fa-solid fa-envelope"></i>

                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                        required>

                </div>

            </div>

            <div class="input-box">

                <label>

                    Password

                </label>

                <div class="input-field">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        id="password"
                        placeholder="Enter your password"
                        required>

                </div>

            </div>

            <div class="options">

                <label class="remember">

                    <input
                        type="checkbox">

                    Remember Me

                </label>

                <a href="#">

                    Forgot Password?

                </a>

            </div>

            <button
                type="submit"
                class="login-btn">

                Login

            </button>

            <div
                id="message">

            </div>

            <div class="bottom-text">

                Don't have an account?

                <a href="signup.html">

                    Register Here

                </a>

            </div>

        </form>

    </div>

    <!-- Background Animation -->

    <script src="background.js"></script>

    <!-- Login Logic -->

    <script src="login.js"></script>

</body>

</html>
