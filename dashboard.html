<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>TaskFlow Pro | Dashboard</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="dark-theme">

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="brand">

            <h1>TaskFlow</h1>

            <p>Productivity Dashboard</p>

        </div>

        <div class="user-card">

            <h3 id="welcomeUser">Welcome</h3>

            <p id="userEmail"></p>

        </div>

        <nav class="sidebar-menu">

            <button class="menu-btn active"
                    data-filter="all">

                📋 All Tasks

            </button>

            <button class="menu-btn"
                    data-filter="pending">

                ⏳ Pending

            </button>

            <button class="menu-btn"
                    data-filter="completed">

                ✅ Completed

            </button>

            <button class="menu-btn"
                    data-filter="high">

                🔥 High Priority

            </button>

        </nav>

        <div class="sidebar-footer">

            <button
                id="logoutBtn"
                class="logout-btn">

                Logout

            </button>

        </div>

    </aside>

    <!-- Main Content -->

    <main class="main-content">

        <!-- Header -->

        <header class="top-bar">

            <div>

                <h1>Task Dashboard</h1>

                <p id="currentDate"></p>

            </div>

            <div class="theme-section">

                <label>Theme</label>

                <select id="themeSelector">

                    <option value="dark-theme">Dark</option>

                    <option value="light-theme">Light</option>

                    <option value="purple-theme">Purple</option>

                    <option value="ocean-theme">Ocean</option>

                    <option value="midnight-theme">Midnight</option>

                </select>

            </div>

        </header>

        <!-- Statistics -->

        <section class="stats-grid">

            <div class="stat-card">

                <h2 id="totalTasks">0</h2>

                <span>Total Tasks</span>

            </div>

            <div class="stat-card">

                <h2 id="pendingTasks">0</h2>

                <span>Pending</span>

            </div>

            <div class="stat-card">

                <h2 id="completedTasks">0</h2>

                <span>Completed</span>

            </div>

            <div class="stat-card">

                <h2 id="highPriorityTasks">0</h2>

                <span>High Priority</span>

            </div>

        </section>

        <!-- Add Task -->

        <section class="task-form">

            <input
                type="text"
                id="taskInput"
                placeholder="Enter task title">

            <textarea
                id="taskDescription"
                placeholder="Task description (Optional)">
            </textarea>

            <select id="prioritySelect">

                <option value="Low">Low Priority</option>

                <option value="Medium">Medium Priority</option>

                <option value="High">High Priority</option>

            </select>

            <input
                type="date"
                id="dueDate">

            <button
                id="addTaskBtn">

                Add Task

            </button>

        </section>

        <!-- Search -->

        <section class="search-section">

            <input
                type="text"
                id="searchInput"
                placeholder="Search Tasks...">

        </section>

        <!-- Empty State -->

        <div
            id="emptyState"
            class="empty-state">

            <h2>No Tasks Found</h2>

            <p>

                Create your first task to get started.

            </p>

        </div>

        <!-- Task List -->

        <section
            id="taskList"
            class="task-list">

        </section>

    </main>

</div>

<script src="script.js"></script>

</body>

</html>
